name: Deploy Backend to VPS (2 Jobs) Test deploy in Master Branch

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true # Tự động cache các module Go

      - name: Build Go Binary
        run: |
          go mod download
          go build -trimpath -ldflags="-s -w" -o mycourse-io-be-dev .

      - name: Upload Binary Artifact
        # Đưa file vừa build lên không gian lưu trữ tạm của GitHub
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: mycourse-io-be-dev
          retention-days: 1 # Chỉ lưu trữ file này trong 1 ngày để đỡ tốn dung lượng GitHub

  deploy:
    runs-on: ubuntu-latest
    needs: build # Job này bắt buộc phải đợi Job 'build' chạy thành công mới bắt đầu
    steps:
      - name: Download Binary Artifact
        # Tải file binary từ không gian tạm về luồng chạy hiện tại
        uses: actions/download-artifact@v4
        with:
          name: backend-binary

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to known_hosts
        run: ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p ${{ secrets.DEPLOY_PATH_DEV }}/bin"

      - name: Deploy Binary to Server via Rsync
        run: |
          rsync -avz --chmod=755 ./mycourse-io-be-dev \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH_DEV }}/bin/mycourse-io-be-dev"

      - name: Reload PM2 on Server
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cd ${{ secrets.DEPLOY_PATH_DEV }} && \
            (pm2 reload mycourse-api-dev || pm2 start ecosystem.config.cjs --only mycourse-api-dev) && \
            git stash -u && \
            git checkout master && \
            git pull"
