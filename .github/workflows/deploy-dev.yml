name: Deploy Backend to VPS (2 Jobs) Test deploy in Master Branch

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true # Cache Go modules automatically

      - name: Download dependencies
        run: |
          # Run apt-get only when packages are missing (clean runners need install; reused runners may already have them)
          need_apt=false
          dpkg -s libvips-dev >/dev/null 2>&1 || need_apt=true
          dpkg -s pkg-config >/dev/null 2>&1 || need_apt=true
          if [ "$need_apt" = true ]; then
            sudo apt-get update -q
            sudo apt-get install -y --no-install-recommends libvips-dev pkg-config
          else
            echo "libvips-dev and pkg-config already installed, skipping apt-get install"
          fi
          go mod download

      - name: Install golangci-lint
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          GOLANGCI_LINT_VERSION="2.12.1"
          if command -v golangci-lint >/dev/null 2>&1 && golangci-lint version 2>/dev/null | grep -Fq "$GOLANGCI_LINT_VERSION"; then
            echo "golangci-lint v${GOLANGCI_LINT_VERSION} already present, skipping go install"
          else
            go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v${GOLANGCI_LINT_VERSION}"
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          golangci-lint version


      - name: Test Go Binary
        run: |
          go test ./...
          CGO_ENABLED=1 go test ./...
          go vet ./...
          golangci-lint cache clean
          golangci-lint run
          make check-architecture

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true # Cache Go modules automatically

      - name: Build Go Binary
        run: |
          need_apt=false
          dpkg -s libvips-dev >/dev/null 2>&1 || need_apt=true
          dpkg -s pkg-config >/dev/null 2>&1 || need_apt=true
          if [ "$need_apt" = true ]; then
            sudo apt-get update -q
            sudo apt-get install -y --no-install-recommends libvips-dev pkg-config
          else
            echo "libvips-dev and pkg-config already installed, skipping apt-get install"
          fi
          go mod download
          CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o mycourse-io-be-dev .

      - name: Upload Binary Artifact
        # Upload the built binary to GitHub Actions artifact storage
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: mycourse-io-be-dev
          retention-days: 1 # Short retention to limit artifact storage usage

  deploy:
    runs-on: ubuntu-latest
    needs: build # This job starts only after the build job succeeds
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Binary Artifact
        # Download the binary from artifact storage into this job's workspace
        uses: actions/download-artifact@v4
        with:
          name: backend-binary

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to known_hosts
        run: ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p ${{ secrets.DEPLOY_PATH_DEV }}/bin ${{ secrets.DEPLOY_PATH_DEV }}/scripts"

      - name: Copy deploy rollback helper to server
        run: |
          scp -q scripts/pm2-reload-with-binary-rollback.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH_DEV }}/scripts/pm2-reload-with-binary-rollback.sh"

      # Binary must be backed up here (before rsync overwrites it). Ecosystem .prev is created only inside the deploy script.
      - name: Backup current dev binary on server (rollback target)
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH_DEV }} && test -f bin/mycourse-io-be-dev && cp bin/mycourse-io-be-dev bin/mycourse-io-be-dev.prev || true"

      - name: Deploy Binary to Server via Rsync
        run: |
          rsync -avz --chmod=755 ./mycourse-io-be-dev \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH_DEV }}/bin/mycourse-io-be-dev"

      - name: Reload PM2 with health gate and binary rollback
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "chmod +x '${{ secrets.DEPLOY_PATH_DEV }}/scripts/pm2-reload-with-binary-rollback.sh' && \
             cd '${{ secrets.DEPLOY_PATH_DEV }}' && \
             DEPLOY_PATH='${{ secrets.DEPLOY_PATH_DEV }}' \
             PM2_APP_NAME=mycourse-api-dev \
             bash scripts/pm2-reload-with-binary-rollback.sh"
