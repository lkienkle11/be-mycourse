  /api/v1/media/files:
    get:
      tags: [Media]
      summary: List media files (paginated)
      description: |
        Sortable `sort_by`: created_at, updated_at, filename, size_bytes (default created_at).
        Searchable `search_by`: filename, object_key, mime_type, status.
        Filter `provider`: S3, GCS, B2, R2, Bunny, Local. Filter `kind`: FILE, VIDEO.
      security:
        - bearerJwt: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: sort_by
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/SortOrder"
        - $ref: "#/components/parameters/SearchBy"
        - $ref: "#/components/parameters/SearchData"
        - name: provider
          in: query
          schema: { type: string, enum: [S3, GCS, B2, R2, Bunny, Local] }
        - name: kind
          in: query
          schema: { type: string, enum: [FILE, VIDEO] }
      responses:
        "200":
          description: Paginated upload descriptors
    post:
      tags: [Media]
      summary: Upload file or video (multipart)
      description: |
        Server-owned contract:
        - multipart text field `kind` is ignored (kind inferred server-side from MIME/extension)
        - multipart text field `metadata` is ignored (response metadata is server/provider extracted)
        - if kind inference fails and no configured provider exists, provider fallback is Local
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                object_key:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOK"
        "413":
          description: File too large

  /api/v1/media/files/cleanup-metrics:
    get:
      tags: [Media]
      summary: Media orphan cleanup counters (atomic gauges)
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK

  /api/v1/media/files/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: Storage object key (single path segment in default Gin routing).
      - name: kind
        in: query
        schema: { type: string, description: FILE or VIDEO }
    get:
      tags: [Media]
      summary: Get file descriptor by object key
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
    put:
      tags: [Media]
      summary: Replace media object (multipart)
      description: |
        Server-owned contract:
        - multipart text field `kind` is ignored
        - multipart text field `metadata` is ignored
        - service uses server/provider extraction only
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                reuse_media_id: { type: string }
                expected_row_version: { type: string }
                skip_upload_if_unchanged: { type: string }
      responses:
        "200":
          description: OK
        "409":
          description: Optimistic lock / reuse mismatch
    delete:
      tags: [Media]
      summary: Delete media object
      security:
        - bearerJwt: []
      parameters:
        - name: metadata
          in: query
          required: false
          schema: { type: string, description: Optional JSON metadata for delete flow }
      responses:
        "200":
          description: Deleted

  /api/v1/media/files/local/{token}:
    get:
      tags: [Media]
      summary: Decode local URL token to object_key
      security:
        - bearerJwt: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 'JSON data contains object_key string'

