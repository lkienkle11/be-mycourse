# TEST=true hoặc STAGE=test → file này. Đọc .env rồi .env.test.
server:
  run_mode: "${SERVER_RUN_MODE}"
  host: "${SERVER_HOST}"
  port: "${SERVER_PORT}"

database:
  url: "${DATABASE_URL}"
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  name: "${DB_NAME}"
  ssl_mode: "${DB_SSLMODE}"
  schema_name: "${SCHEMA_NAME_APP}"

app:
  jwt_secret: "${JWT_SECRET}"
  api_key: "${API_KEY}"
  app_base_url: "${APP_BASE_URL}"
  app_client_base_url: "${APP_CLIENT_BASE_URL}"
  auth_cookie_domain: "${AUTH_COOKIE_DOMAIN}"
  cors:
    allowed_origins: "${CORS_ALLOWED_ORIGINS}"

brevo:
  api_key: "${BREVO_API_KEY}"
  sender_email: "${BREVO_SENDER_EMAIL}"
  sender_name: "${BREVO_SENDER_NAME}"

redis:
  addr: "${REDIS_ADDR}"
  password: "${REDIS_PASSWORD}"
  db: 0

lavinmq:
  url: "${CLOUDAMQP_URL}"
  exchange: "${LAVINMQ_EXCHANGE}"
  enabled: "${LAVINMQ_ENABLED}"

supabase:
  project_ref: "${SUPABASE_PROJECT_REF}"
  url: "${SUPABASE_URL}"
  anon_key: "${SUPABASE_ANON_KEY}"
  service_role_key: "${SUPABASE_SERVICE_ROLE_KEY}"
  db_url: "${SUPABASE_DB_URL}"

media:
  app_media_provider: ""
  r2_account_id: ""
  r2_access_key_id: ""
  r2_secret_access_key: ""
  r2_bucket: ""
  r2_endpoint: ""
  r2_region: ""
  r2_public_url: ""
  bunny_stream_api_base_url: "${MEDIA_BUNNY_STREAM_API_BASE_URL}"
  bunny_stream_api_key: "${MEDIA_BUNNY_STREAM_API_KEY}"
  bunny_stream_read_only_api_key: "${MEDIA_BUNNY_STREAM_READ_ONLY_API_KEY}"
  bunny_stream_library_id: "${MEDIA_BUNNY_LIBRARY_ID}"
  bunny_stream_base_url: "${MEDIA_BUNNY_STREAM_BASE_URL}"
  bunny_stream_cdn_hostname: "${MEDIA_BUNNY_STREAM_CDN_HOSTNAME}"
  bunny_storage_endpoint: "${MEDIA_BUNNY_STORAGE_ENDPOINT}"
  bunny_storage_password: "${MEDIA_BUNNY_STORAGE_PASSWORD}"
  local_file_url_secret: "${LOCAL_FILE_URL_SECRET}"

oauth:
  google_client_id: "${GOOGLE_CLIENT_ID}"
  google_client_secret: "${GOOGLE_CLIENT_SECRET}"
  x_client_id: "${X_CLIENT_ID}"
  x_client_secret: "${X_CLIENT_SECRET}"
  x_callback_url: "${X_CALLBACK_URL}"
  discord_client_id: "${DISCORD_CLIENT_ID}"
  discord_client_secret: "${DISCORD_CLIENT_SECRET}"
  discord_callback_url: "${DISCORD_CALLBACK_URL}"

logging:
  level: "${LOG_LEVEL}"
  format: "${LOG_FORMAT}"
  file_path: "${LOG_FILE_PATH}"
  log_dir: "${LOG_DIR}"
  app_name: "${LOG_APP_NAME}"
  vendor: "${LOG_VENDOR}"
  path_mode: "${LOG_PATH_MODE}"
  file_enabled: "${LOG_FILE_ENABLED}"
  console_also: "${LOG_CONSOLE}"
  max_size_mb: "${LOG_MAX_SIZE_MB}"
  max_backups: "${LOG_MAX_BACKUPS}"
  max_age_days: "${LOG_MAX_AGE_DAYS}"
  compress: "${LOG_COMPRESS}"
  instance_id: "${LOG_INSTANCE_ID}"
  service_name: "${LOG_SERVICE_NAME}"
  environment: "${LOG_ENVIRONMENT}"
  version: "${APP_VERSION}"
  redirect_stdlog: "${LOG_REDIRECT_STDLOG}"
