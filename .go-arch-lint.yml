# DDD layer boundaries for internal/{feature}/{domain,application,infra,delivery}.
# Run: make check-architecture
version: 3
workdir: internal
allow:
  # Vendor allowlist is enforced by golangci depguard (main rule). Here we only check internal layers.
  depOnAnyVendor: true
  # false = chỉ check import giữa layer; không quét inject/type-flow (wire, BindJSON, middleware…).
  deepScan: false

excludeFiles:
  - "^.*_test\\.go$"

components:
  domain:
    in: "*/domain"
  application:
    in: "*/application"
  infra:
    in: "*/infra"
  delivery:
    in: "*/delivery"
  shared:
    in: "shared/**"
  server:
    in: "server/**"
  jobs:
    in: "*/jobs/**"
  appcli:
    in: "appcli/**"
  pkg:
    in: "../pkg/**"
  migrations:
    in: "../migrations/**"

commonComponents:
  - shared
  - pkg
  - migrations

deps:
  domain:
    mayDependOn:
      - shared
  application:
    mayDependOn:
      - domain
      - shared
      - pkg
  infra:
    mayDependOn:
      - application
      - domain
      - shared
      - pkg
  delivery:
    mayDependOn:
      - application
      - domain
      - jobs
      - shared
      - pkg
  jobs:
    mayDependOn:
      - application
      - domain
      - shared
      - infra
  appcli:
    anyProjectDeps: true
  server:
    anyProjectDeps: true
