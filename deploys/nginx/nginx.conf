server {

    server_name api.yourdomain.com;

    location /api/v1/media/files {
        # Chỉ cho phép file tối đa 2GB đi qua endpoint này
        client_max_body_size 2050M;

        # Tăng timeout đọc body từ client tránh đứt kết nối giữa chừng do mạng chậm
        client_body_timeout 120s;

        # Copy lại các cấu hình proxy bắt buộc để đẩy request về backend (port 8080)
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cấu hình timeout cho kết nối với backend (giống cấu hình cũ của bạn)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Header test của bạn
        add_header X-NGINX-TEST $request_id always;
    }

    location / {

        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        # proxy_read_timeout 90s;

	# --- CAU HINH THEM CHO WEBSOCKET ---
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # --- CAU HINH THEM CHO SSE ---
        proxy_buffering off;
        proxy_cache off;

        # --- CAU HINH TIMEOUT ---
        proxy_read_timeout 3600s; 
        proxy_send_timeout 3600s;
	
	add_header X-NGINX-TEST $request_id always;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = api.yourdomain.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot



    listen 80;

    server_name api.yourdomain.com;
    return 404; # managed by Certbot


}