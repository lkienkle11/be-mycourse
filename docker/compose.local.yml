# Docker Compose — STAGE=local (host port 8080)
# Copy: cp .env.example .env && cp .env.local.example .env.local
name: mycourse-be-local

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        STAGE: local
    image: mycourse-io-be:local
    env_file:
      - ../.env
      - ../.env.local
    environment:
      STAGE: local
      CGO_ENABLED: "1"
      MIGRATE: "1"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

