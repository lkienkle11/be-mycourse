<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0"
             style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

        <tr><td style="background:#1a56db;padding:32px 40px;text-align:center;">
          <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:700;">MyCourse</h1>
        </td></tr>

        <tr><td style="padding:40px;">
          <h2 style="margin:0 0 16px;color:#111827;font-size:20px;">{{.Greeting}}</h2>
          <p style="margin:0 0 24px;color:#374151;line-height:1.6;">{{.Body}}</p>

          <table cellpadding="0" cellspacing="0"><tr><td>
            <a href="{{.ConfirmURL}}"
               style="display:inline-block;background:#1a56db;color:#ffffff;text-decoration:none;
                      padding:14px 32px;border-radius:6px;font-size:16px;font-weight:600;">
              {{.CTAButton}}
            </a>
          </td></tr></table>

          <p style="margin:24px 0 0;color:#6b7280;font-size:14px;line-height:1.5;">
            {{.IgnoreNote}}<br>{{.ExpiryNote}}
          </p>

          <hr style="border:none;border-top:1px solid #e5e7eb;margin:32px 0;">

          <p style="margin:0;color:#9ca3af;font-size:12px;">
            {{.CopyLinkHint}}<br>
            <span style="color:#1a56db;word-break:break-all;">{{.ConfirmURL}}</span>
          </p>
        </td></tr>

        <tr><td style="background:#f9fafb;padding:20px 40px;text-align:center;">
          <p style="margin:0;color:#9ca3af;font-size:12px;">{{.Copyright}}</p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
