        description: Storage object key (single path segment in default Gin routing).
      - name: kind
        in: query
        schema: { type: string, description: FILE or VIDEO }
    get:
      tags: [Media]
      summary: Get file descriptor by object key
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
    put:
      tags: [Media]
      summary: Replace media object (multipart)
      description: |
        Server-owned contract:
        - multipart text field `kind` is ignored
        - multipart text field `metadata` is ignored
        - service uses server/provider extraction only
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                reuse_media_id: { type: string }
                expected_row_version: { type: string }
                skip_upload_if_unchanged: { type: string }
      responses:
        "200":
          description: OK
        "409":
          description: Optimistic lock / reuse mismatch
    delete:
      tags: [Media]
      summary: Delete media object
      security:
        - bearerJwt: []
      parameters:
        - name: metadata
          in: query
          required: false
          schema:
            {
              type: string,
              description: Optional JSON metadata for delete flow,
            }
      responses:
        "200":
          description: Deleted

