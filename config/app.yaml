# Mặc định khi không đặt STAGE và không chạy TEST=true.
# .env + (không có .env.<stage>). Placeholder ${VAR} lấy từ map .env rồi os.Getenv.
server:
  run_mode: "${SERVER_RUN_MODE}"
  host: "${SERVER_HOST}"
  port: "${SERVER_PORT}"

database:
  url: "${DATABASE_URL}"
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  name: "${DB_NAME}"
  ssl_mode: "${DB_SSLMODE}"

app:
  jwt_secret: "${JWT_SECRET}"
  api_key: "${API_KEY}"
  app_base_url: "${APP_BASE_URL}"
  cors:
    allowed_origins: "${CORS_ALLOWED_ORIGINS}"

brevo:
  api_key: "${BREVO_API_KEY}"
  sender_email: "${BREVO_SENDER_EMAIL}"
  sender_name: "${BREVO_SENDER_NAME}"

redis:
  addr: "${REDIS_ADDR}"
  password: "${REDIS_PASSWORD}"
  db: 0

supabase:
  project_ref: "${SUPABASE_PROJECT_REF}"
  url: "${SUPABASE_URL}"
  anon_key: "${SUPABASE_ANON_KEY}"
  service_role_key: "${SUPABASE_SERVICE_ROLE_KEY}"
  db_url: "${SUPABASE_DB_URL}"

media:
  b2_key_id: "${MEDIA_B2_KEY_ID}"
  b2_app_key: "${MEDIA_B2_APP_KEY}"
  b2_bucket: "${MEDIA_B2_BUCKET}"
  b2_base_url: "${MEDIA_B2_BASE_URL}"
  gcore_api_base_url: "${MEDIA_GCORE_API_BASE_URL}"
  gcore_api_token: "${MEDIA_GCORE_API_TOKEN}"
  gcore_cdn_url: "${MEDIA_GCORE_CDN_URL}"
  bunny_stream_api_base_url: "${MEDIA_BUNNY_STREAM_API_BASE_URL}"
  bunny_stream_api_key: "${MEDIA_BUNNY_STREAM_API_KEY}"
  bunny_stream_library_id: "${MEDIA_BUNNY_LIBRARY_ID}"
  bunny_stream_base_url: "${MEDIA_BUNNY_STREAM_BASE_URL}"
  bunny_storage_endpoint: "${MEDIA_BUNNY_STORAGE_ENDPOINT}"
  bunny_storage_password: "${MEDIA_BUNNY_STORAGE_PASSWORD}"
  local_file_url_secret: "${LOCAL_FILE_URL_SECRET}"
