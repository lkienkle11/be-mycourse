  /api/v1/media/files:
    get:
      tags: [Media]
      summary: List media files (paginated)
      description: |
        Sortable `sort_by`: created_at, updated_at, filename, size_bytes (default created_at).
        Sort direction `sort_order`: asc, desc (default desc).
        Filename `search`: case-insensitive partial match on `filename` only.
        Filter `provider`: S3, GCS, B2, R2, Bunny, Local. Filter `kind`: FILE, VIDEO.
        Filter `category`: image, document, video — forces kind when set (image/document → FILE, video → VIDEO)
        and applies MIME/extension rules aligned with upload classification.
      security:
        - bearerJwt: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: search
          in: query
          schema: { type: string }
          description: Filename search term (`filename ILIKE %term%`), not ID/object key search.
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, updated_at, filename, size_bytes]
            default: created_at
        - $ref: "#/components/parameters/SortOrder"
        - name: provider
          in: query
          schema: { type: string, enum: [S3, GCS, B2, R2, Bunny, Local] }
        - name: kind
          in: query
          schema: { type: string, enum: [FILE, VIDEO] }
        - name: category
          in: query
          schema: { type: string, enum: [image, document, video] }
      responses:
        "200":
          description: Paginated upload descriptors
    post:
      tags: [Media]
      summary: Upload file or video (multipart)
      description: |
        Server-owned contract:
        - multipart text field `kind` is ignored (kind inferred server-side from MIME/extension)
        - multipart text field `metadata` is ignored (response metadata is server/provider extracted)
        - if kind inference fails and no configured provider exists, provider fallback is Local
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                object_key:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOK"
        "413":
          description: File too large

