version: "2"
linters:
  default: none
  enable:
    - dupl # Duplicate AST fragments (per package; see settings.dupl)
    - gocyclo # Cyclomatic complexity (if/else, switch)
    - funlen # Long functions / too many statements
    - depguard # DDD import boundaries under internal/
    - errcheck # Unchecked errors
    - staticcheck # Simplifications and static checks (gosimple successor)
    - govet # Basic Go correctness
    - revive
    - nolintlint

  settings:
    revive:
      rules:
        - name: file-length-limit
          arguments:
            - max: 600 # Fail if file exceeds 500 lines
              skip-comments: true # Exclude comment lines from count
              skip-blank-lines: true # Exclude blank lines from count
        - name: argument-limit
          severity: error
          arguments: [8]
    funlen:
      lines: 60
      statements: 40
    gocyclo:
      min-complexity: 15
    dupl:
      # Per-package clones only. Cross-package: make check-dupl (DUPL_THRESHOLD=60).
      threshold: 60
    nolintlint:
      allow-unused: false
      allow-no-explanation: []
      require-explanation: true
      require-specific: true
    # depguard v2: main allowlist for the module; DDD rules add deny constraints per path.
    depguard:
      rules:
        main:
          files:
            - $all
          allow:
            - $gostd
            - go/ast
            - go/token
            - mycourse-io-be
            - github.com
            - golang.org
            - gorm.io
            - google.golang.org
            - gopkg.in
            - go.uber.org
            - go.mongodb.org

        domain-no-implementation-interface-details:
          list-mode: lax
          files:
            - "**/internal/**/domain/**/*.go"
          deny:
            - pkg: "github.com/gin-gonic/gin"
              desc: "domain must not depend on delivery frameworks"
            - pkg: "github.com/golang-jwt/jwt/v5"
              desc: "domain must not implement JWT/token infrastructure"
            - pkg: "github.com/google/uuid"
              desc: "domain must not generate UUIDs directly"
            - pkg: "database/sql"
              desc: "domain must not depend on database access"
            - pkg: "database/sql/driver"
              desc: "domain must not implement database driver persistence contracts"
            - pkg: "encoding/json"
              desc: "domain must not implement persistence serialization details"
            - pkg: "gorm.io/gorm"
              desc: "domain must not depend on ORM infrastructure"
            - pkg: "net/http"
              desc: "domain must not depend on HTTP transport"
            - pkg: "os"
              desc: "domain must not read environment variables or the filesystem"
            - pkg: "io"
              desc: "domain must not read or write to the filesystem"
            - pkg: "mime/multipart"
              desc: "domain must not depend on multipart parsing"
            - pkg: "crypto/hmac"
              desc: "domain must not implement HMAC details"
            - pkg: "crypto/sha256"
              desc: "domain must not implement SHA256 details"
            - pkg: "encoding/hex"
              desc: "domain must not implement encoding details for crypto digests"
